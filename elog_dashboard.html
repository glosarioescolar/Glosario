<html lang="es">
<head>

    <title>Estación Meteorológica — 10/03/2026</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d2e;
            --bg-card: #1e2235;
            --bg-card-hover: #252a40;
            --text-primary: #e8eaf6;
            --text-secondary: #9ea3c2;
            --accent-1: #6c63ff;
            --accent-2: #00d9ff;
            --accent-3: #ff6b9d;
            --accent-4: #ffd93d;
            --accent-5: #6bff8e;
            --accent-6: #ff8a65;
            --border: rgba(108, 99, 255, 0.15);
            --glow: rgba(108, 99, 255, 0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border-bottom: 1px solid var(--border);
            padding: 28px 40px;
            position: relative; overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 50%, var(--glow) 0%, transparent 60%);
            pointer-events: none;
        }
        header h1 {
            font-size: 1.75rem; font-weight: 700;
            background: linear-gradient(135deg, var(--accent-2), var(--accent-1));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            position: relative;
        }
        header p { color: var(--text-secondary); font-size: 0.9rem; margin-top: 6px; position: relative; }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px; padding: 24px 40px;
        }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px 22px;
            transition: all 0.3s ease; overflow: hidden;
        }
        .stat-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .stat-card .label {
            font-size: 0.72rem; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--text-secondary); font-weight: 500;
        }
        .stat-card .value { font-size: 1.6rem; font-weight: 700; margin-top: 6px; }
        .stat-card .unit { font-size: 0.8rem; color: var(--text-secondary); font-weight: 400; }
        .dashboard {
            padding: 10px 40px 40px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
        }
        .chart-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px;
            transition: all 0.3s ease;
        }
        .chart-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.25); }
        .chart-card.full-width { grid-column: 1 / -1; }
        .chart-card h3 {
            font-size: 1rem; font-weight: 600; margin-bottom: 16px;
            display: flex; align-items: center; gap: 10px;
        }
        .chart-card h3 .icon {
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
        }
        .chart-container { position: relative; height: 320px; }
        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr; padding: 10px 16px 30px; }
            .stats-bar { padding: 16px; }
            header { padding: 20px 16px; }
        }
    </style>
</head>

    const DATA = RAW.map(r => {
        const [dp, tp] = r.t.split(' ');
        const [d, m, y] = dp.split('/');
        return { ...r, time: new Date(y + '-' + m + '-' + d + 'T' + tp) };
    });

    function col(key) {
        const idx = CM[key];
        return DATA.map(d => ({ x: d.time, y: d[idx] })).filter(d => d.y !== null);
    }

    function makeChart(id, datasets, yLabel, yMin, yMax) {
        new Chart(document.getElementById(id).getContext('2d'), {
            type: 'line',
            data: { datasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },

                    }
                },
                scales: {
                    x: {
                        type: 'time', time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } },
                        title: { display: true, text: 'Hora', font: { size: 11 } },
                        grid: { color: 'rgba(108,99,255,0.06)' }
                    },
                    y: {
                        title: { display: true, text: yLabel, font: { size: 11 } },
                        min: yMin, max: yMax,
                        grid: { color: 'rgba(108,99,255,0.06)' }
                    }
